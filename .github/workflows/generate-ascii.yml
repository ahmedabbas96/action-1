name: Generate ASCII 

on: [push]

jobs:
    build-job1:
        runs-on: ubuntu-latest
        steps:
        - name: Install Cowsay
          run: sudo apt-get install cowsay -y
        
        - name: Gernerate ASCII
          run: cowsay -f dragon "ROARRRR! I'm DevOps dragon" >> dragon.txt

        - name: Upload Dragon file
          uses: actions/upload-artifact@v6
          with:
            name: dragon-file
            path: dragon.txt

    test-job2:
        needs: build-job1
        runs-on: ubuntu-latest
        steps:
        - name: Download Dragon file
          uses: actions/download-artifact@v8
          with:
            name: dragon-file

        - name: Test File Exits
          run: grep -i "dragon" dragon.txt

    deploy-job3:
        needs: test-job2
        runs-on: ubuntu-latest
        steps:
        - name: Download Dragon file
          uses: actions/download-artifact@v8
          with:
            name: dragon-file

        - name: Read File
          run: cat dragon.txt
        
        - name: Deploy
          run: echo Deploying ... .. .

