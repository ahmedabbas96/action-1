name: matrix-configuration

on: 
    push:
    workflow_dispatch:

jobs:
    deploy-on-ubuntu:
        strategy:
            matrix:
                os : [ubuntu-latest, ubuntu-20.04, windows-latest]
                images: [hello-world, alpine]
        runs-on: ${{ matrix.os }}
        steps:
         - name: Docker details
           run: docker info

         - name: Run Image ${{ matrix.images }}
           run: docker run ${{ matrix.images }}

    

